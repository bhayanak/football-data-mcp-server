<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5e1f"/>
      <stop offset="50%" stop-color="#0d7a1e"/>
      <stop offset="100%" stop-color="#064d12"/>
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </linearGradient>
    <!-- Ball gradient for 3D feel -->
    <radialGradient id="ballGrad" cx="0.38" cy="0.32" r="0.65">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8edf2"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </radialGradient>
    <!-- Inner shield glow -->
    <radialGradient id="innerGlow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Field green gradient -->
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8a3e"/>
      <stop offset="100%" stop-color="#1a6b28"/>
    </linearGradient>
    <!-- Sky gradient (top of shield interior) -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#143a5c"/>
    </linearGradient>
    <!-- Data node glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Star glow -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ SHIELD SHAPE ═══ -->
  <!-- Outer gold border -->
  <path d="M256 18 C180 18, 68 28, 52 48 C36 68, 32 120, 32 160
           C32 300, 120 400, 256 494
           C392 400, 480 300, 480 160
           C480 120, 476 68, 460 48
           C444 28, 332 18, 256 18 Z"
        fill="url(#goldGrad)" stroke="#c89200" stroke-width="2"/>

  <!-- Main shield body -->
  <path d="M256 32 C184 32, 80 41, 66 58
           C52 75, 48 122, 48 158
           C48 290, 132 386, 256 474
           C380 386, 464 290, 464 158
           C464 122, 460 75, 446 58
           C432 41, 328 32, 256 32 Z"
        fill="url(#shieldGrad)"/>

  <!-- Inner glow overlay -->
  <path d="M256 32 C184 32, 80 41, 66 58
           C52 75, 48 122, 48 158
           C48 290, 132 386, 256 474
           C380 386, 464 290, 464 158
           C464 122, 460 75, 446 58
           C432 41, 328 32, 256 32 Z"
        fill="url(#innerGlow)"/>

  <!-- ═══ HORIZONTAL GOLD STRIPE (banner area) ═══ -->
  <clipPath id="shieldClip">
    <path d="M256 32 C184 32, 80 41, 66 58
             C52 75, 48 122, 48 158
             C48 290, 132 386, 256 474
             C380 386, 464 290, 464 158
             C464 122, 460 75, 446 58
             C432 41, 328 32, 256 32 Z"/>
  </clipPath>

  <g clip-path="url(#shieldClip)">
    <!-- Dark sky top section -->
    <rect x="40" y="30" width="432" height="160" fill="url(#skyGrad)" opacity="0.5"/>

    <!-- Thin gold decorative lines -->
    <line x1="60" y1="175" x2="452" y2="175" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="178" x2="452" y2="178" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>

    <!-- Field-like bottom (subtle green gradient) -->
    <rect x="40" y="320" width="432" height="180" fill="url(#fieldGrad)" opacity="0.3"/>

    <!-- Field lines (subtle) -->
    <ellipse cx="256" cy="380" rx="80" ry="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="256" y1="350" x2="256" y2="410" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <!-- ═══ FOOTBALL / SOCCER BALL ═══ -->
  <g transform="translate(256, 238)">
    <!-- Ball shadow -->
    <ellipse cx="3" cy="70" rx="46" ry="8" fill="rgba(0,0,0,0.15)"/>

    <!-- Main ball -->
    <circle cx="0" cy="0" r="62" fill="url(#ballGrad)" stroke="#bbb" stroke-width="1"/>

    <!-- Soccer pattern clipped to ball -->
    <clipPath id="ballClip"><circle cx="0" cy="0" r="61"/></clipPath>
    <g clip-path="url(#ballClip)">
      <!-- Subtle seam lines -->
      <line x1="0" y1="-20" x2="0" y2="-56" stroke="#ccc" stroke-width="1"/>
      <line x1="19" y1="-6" x2="52" y2="-18" stroke="#ccc" stroke-width="1"/>
      <line x1="12" y1="16" x2="34" y2="48" stroke="#ccc" stroke-width="1"/>
      <line x1="-12" y1="16" x2="-34" y2="48" stroke="#ccc" stroke-width="1"/>
      <line x1="-19" y1="-6" x2="-52" y2="-18" stroke="#ccc" stroke-width="1"/>
      <path d="M0,-56 Q28,-48 52,-18" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M52,-18 Q58,16 34,48" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M34,48 Q0,64 -34,48" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M-34,48 Q-58,16 -52,-18" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M-52,-18 Q-28,-48 0,-56" fill="none" stroke="#ccc" stroke-width="1"/>

      <!-- Center pentagon (rounded corners via thick stroke-linejoin) -->
      <path d="M0,-20 L19,-6 L12,16 L-12,16 L-19,-6 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

      <!-- Top pentagon -->
      <path d="M-10,-34 L10,-34 L16,-48 L0,-62 L-16,-48 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

      <!-- Upper-right pentagon -->
      <path d="M28,-12 L36,6 L54,-2 L54,-24 L38,-30 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

      <!-- Lower-right pentagon -->
      <path d="M16,26 L6,46 L22,58 L40,46 L32,26 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

      <!-- Lower-left pentagon -->
      <path d="M-16,26 L-6,46 L-22,58 L-40,46 L-32,26 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

      <!-- Upper-left pentagon -->
      <path d="M-28,-12 L-36,6 L-54,-2 L-54,-24 L-38,-30 Z"
            fill="#1e293b" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
    </g>

    <!-- Glossy highlight -->
    <ellipse cx="-16" cy="-24" rx="22" ry="15" fill="rgba(255,255,255,0.35)" transform="rotate(-20)"/>
    <ellipse cx="-12" cy="-18" rx="10" ry="6" fill="rgba(255,255,255,0.2)" transform="rotate(-20)"/>
  </g>

  <!-- ═══ DATA VISUALIZATION ELEMENTS ═══ -->
  <g clip-path="url(#shieldClip)">
  <g filter="url(#nodeGlow)" opacity="0.9">
    <!-- Node: top-left -->
    <line x1="100" y1="195" x2="198" y2="228" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
    <circle cx="100" cy="195" r="8" fill="#38bdf8"/>
    <circle cx="100" cy="195" r="3.5" fill="#ffffff"/>

    <!-- Node: top-right -->
    <line x1="412" y1="195" x2="314" y2="228" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
    <circle cx="412" cy="195" r="8" fill="#22d3ee"/>
    <circle cx="412" cy="195" r="3.5" fill="#ffffff"/>

    <!-- Node: left -->
    <line x1="100" y1="300" x2="198" y2="260" stroke="#10b981" stroke-width="2" stroke-dasharray="5,4" opacity="0.7"/>
    <circle cx="100" cy="300" r="7" fill="#10b981"/>
    <circle cx="100" cy="300" r="3" fill="#ffffff"/>

    <!-- Node: right -->
    <line x1="412" y1="300" x2="314" y2="260" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,4" opacity="0.7"/>
    <circle cx="412" cy="300" r="7" fill="#a855f7"/>
    <circle cx="412" cy="300" r="3" fill="#ffffff"/>

    <!-- Data particles -->
    <circle cx="148" cy="212" r="3" fill="#38bdf8" opacity="0.6"/>
    <circle cx="364" cy="212" r="3" fill="#22d3ee" opacity="0.6"/>
    <circle cx="148" cy="280" r="2.5" fill="#10b981" opacity="0.5"/>
    <circle cx="364" cy="280" r="2.5" fill="#a855f7" opacity="0.5"/>
  </g>
  </g>

  <!-- ═══ STARS (decorative, top) ═══ -->
  <g filter="url(#starGlow)">
    <polygon points="206,65 210,55 214,65 224,65 216,72 218,82 210,76 202,82 204,72 196,65"
             fill="#ffd700" opacity="0.9"/>
    <polygon points="248,52 252,42 256,52 266,52 258,59 260,69 252,63 244,69 246,59 238,52"
             fill="#ffd700" opacity="0.9"/>
    <polygon points="290,65 294,55 298,65 308,65 300,72 302,82 294,76 286,82 288,72 280,65"
             fill="#ffd700" opacity="0.9"/>
  </g>

  <!-- ═══ TEXT: "FOOTBALL DATA" ═══ -->
  <text x="256" y="108" text-anchor="middle" font-family="'Arial Black', 'Impact', Arial, sans-serif"
        font-size="46" font-weight="900" fill="#34d399" letter-spacing="3"
        filter="url(#textShadow)">FOOTBALL</text>
  <text x="256" y="155" text-anchor="middle" font-family="'Arial Black', 'Impact', Arial, sans-serif"
        font-size="42" font-weight="900" fill="#ffd700" letter-spacing="5"
        filter="url(#textShadow)">DATA</text>

  <!-- ═══ TEXT: "MCP SERVER" (bottom banner) ═══ -->
  <!-- Banner background -->
  <g clip-path="url(#shieldClip)">
    <rect x="130" y="368" width="252" height="38" rx="6" fill="rgba(0,0,0,0.5)"/>
    <rect x="130" y="368" width="252" height="38" rx="6" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="256" y="394" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
        font-size="22" font-weight="700" fill="#ffd700" letter-spacing="6"
        filter="url(#textShadow)">MCP SERVER</text>

  <!-- ═══ BOTTOM DECORATIVE ARC (gold) ═══ -->
  <g clip-path="url(#shieldClip)">
    <path d="M140 430 Q 256 465, 372 430" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.35"/>
  </g>
</svg>
